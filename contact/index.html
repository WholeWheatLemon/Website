<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="../images/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ollie.lol - contact</title>

    <style>

        :root {
            --pixel-size: 4;
        }

        @media screen and (max-width: 775px) {
            
            :root {
                --pixel-size: 3;
            }
        }

        @font-face { font-family: bobbledop; src: url('../bobbledop.ttf'); }

        body {
            background-color: #356c76;
        }

        p {
            margin: 0;
            padding: calc(6px * var(--pixel-size));
            font-family: bobbledop,serif;
            font-size: calc(8px * var(--pixel-size));
            line-height: calc(10px * var(--pixel-size));
            color: #ffaf15;
            text-align: center;
        }

        pre {
            margin: 0;
            padding: calc(2px * var(--pixel-size));
            font-family: bobbledop,serif;
            font-size: calc(8px * var(--pixel-size));
            line-height: calc(10px * var(--pixel-size));
            color: #ffaf15;
        }

        .centered-text {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: calc(10px * var(--pixel-size));
        }

        a {
            text-decoration: none;
        }

        br {
            display: block;
            content: "";
            margin-bottom: calc(10px * var(--pixel-size));
        }

    </style>
</head>
<body>
    <a href="../">
        <pre class="centered-text" style="color:#e0e0e0">&lt; back </pre>
    </a>
    <p class="centered-text" style="padding-top: calc(6px * var(--pixel-size))">contact me!</p>

    <div class="centered-text">
        <p style="color:#e0e0e0">
            <span style="color:#ffaf15">*</span> email: <span style="color:#ffaf15">me@ollie.lol</span><br>
            <span style="color:#ffaf15">*</span> discord: <span style="color:#ffaf15">@wholewheatlemon</span><br>
            twitter: <span style="color:#ffaf15">@WholeWheatOllie</span><br>
            bluesky: <span style="color:#ffaf15">@ollie.lol</span><br>
        </p>
    </div>
</body>
</html>
