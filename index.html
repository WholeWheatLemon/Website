<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="images/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ollie.lol</title>
    <style>

      :root {
        --pixel-size: 4;
      }

      @media screen and (max-width: 600px) {
        :root {
          --pixel-size: 3;
        }

        /* .spacer {
            display: none;
        } */

        .image-link-container {
          margin-right: 0;
        }
      }

      @font-face { font-family: bobbledop; src: url('bobbledop.ttf'); }

      a {
        text-decoration: none;
      }

      body {
        background-color: #356c76;
        padding-top: calc(4px * var(--pixel-size));
        padding-bottom: calc(20px * var(--pixel-size));
        font-family: bobbledop,serif;
        font-size: calc(8px * var(--pixel-size));
        line-height: calc(11px * var(--pixel-size));
      }

      p {
        margin: 0;
        padding: calc(2px * var(--pixel-size));
        color: #ffaf15;
      }

      pre {
        margin: 0;
        padding: calc(2px * var(--pixel-size));
        font-family: bobbledop,serif;
        color: #ffaf15;
      }

      .header-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: calc(6px * var(--pixel-size));
        margin: calc(6px * var(--pixel-size));
      }

      .link-icon-container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: calc(3px * var(--pixel-size));
        padding-top: calc(2px * var(--pixel-size));
      }

      .link-icon-image {
        image-rendering: pixelated;
        width: calc(17px * var(--pixel-size));
        height: auto;
      }

      .header-text {
        color: #ffaf15;
      }

      .header-image {
        image-rendering: pixelated;
        width: calc(17px * var(--pixel-size));
        height: calc(17px * var(--pixel-size));
      }

      .image-link-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: calc(24px * var(--pixel-size));
        row-gap: calc(4px * var(--pixel-size));
        margin: calc(11px * var(--pixel-size));
      }

      .image-link {
        image-rendering: pixelated;
        height: calc(9px * var(--pixel-size));
        width: auto;
      }

      .centered-text {
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: bobbledop,serif;
        line-height: calc(11px * var(--pixel-size));
      }

      .experience_container {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: calc(5px * var(--pixel-size));
      }

      .work_logos {
        image-rendering: pixelated;
        height: calc(18px * var(--pixel-size));
        width: calc(18px * var(--pixel-size));
      }

    </style>
  </head>
  <body>
    <div class="header-container">
      <img src="images/icon.png" alt="Icon" class="header-image">
      <p class="header-text">ollie.lol</p>
    </div>

    <div class="link-icon-container">
      <a href="https://github.com/WholeWheatLemon" target="_blank">
        <img src="images/link-buttons/github.png" alt="Github" class="link-icon-image">
      </a>
      <a href="https://bsky.app/profile/ollie.lol" target="_blank">
        <img src="images/link-buttons/bluesky.png" alt="Bluesky" class="link-icon-image">
      </a>
      <a href="https://x.com/WholeWheatOllie" target="_blank">
        <img src="images/link-buttons/twitter.png" alt="Twitter" class="link-icon-image">
      </a>
      <a href="https://ko-fi.com/wholewheatlemon" target="_blank">
        <img src="images/link-buttons/kofi.png" alt="Ko-fi" class="link-icon-image">
      </a>
    </div>

    <div class="image-link-container">
      <a href="portfolio/">
        <img src="images/link-text/portfolio.png" alt="Portfolio" class="image-link">
      </a>
      <a href="contact/">
        <img src="images/link-text/contact-me.png" alt="Contact Me" class="image-link">
      </a>
    </div>

    <div class="centered-text">
      <pre style="color: #ffaf15"><span class="spacer">--- </span>about me<span class="spacer"> ---</span></pre>
    </div>
    <div class="centered-text">
      <p style="color: #e0e0e0; width: min(90vw, 800px); padding-top: calc(2px * var(--pixel-size))">
        Hi! I'm <span style="color: #ffaf15">Ollie</span>, a Brazilian-American artist and hobbyist game dev.<br><br>
        I primarily do Minecraft resource pack work, both professionally and for fun.
      </p>
    </div>
    <div class="centered-text">
      <pre style="padding-top: calc(7px * var(--pixel-size)); line-height: calc(4px * var(--pixel-size));">
        <br><span class="spacer">--- </span>work experience<span class="spacer"> ---</span>
      </pre>
    </div>

    <div class="experience_container">
      <a href="https://hideaway.gg/" target="_blank">
        <img src="images/logos/hideaway.png" alt="Hideaway" class="work_logos">
      </a>
      <a href="https://hideaway.gg/" target="_blank">
        <p style="color: #e0e0e0; position:relative; bottom:3px">Hideaway<br><span style="color:#ffaf15">2024</span></p>
      </a>

    </div>

  </body>
</html>
