<!DOCTYPE html>
<html lang="en">
<head>

    <title>ollie.lol - portfolio</title>

    <style>
        @font-face { font-family: bobbledop; src: url('../bobbledop.ttf'); }

        a {
            text-decoration: none;

        p {
            margin: 0;
            padding: 12px;
            font-family: bobbledop,serif;
            font-size: 48px;
            line-height: 66px;
            color: #ffaf15;
        }

        pre {
            margin: 0;
            padding: 12px;
            font-family: bobbledop,serif;

            line-height: 66px;

        }

            display: flex;

            padding-top: 60px;

        .item-container {
            display: flex;
            flex-wrap: wrap;

            height: auto;
        }

    </style>

</head>

    <a href="../">

    <div class="item-container">
