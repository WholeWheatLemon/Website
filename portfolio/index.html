<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="../images/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ollie.lol - portfolio</title>

    <style>

        :root {
            --pixel-size: 4;
        }

        @media screen and (max-width: 775px) {
            
            :root {
                --pixel-size: 3;
            }

            /* .spacer {
                display: none;
            } */
        }

        @font-face { font-family: bobbledop; src: url('../bobbledop.ttf'); }

        a {
            text-decoration: none;
        }

        p {
            margin: 0;
            padding: calc(2px * var(--pixel-size));
            font-family: bobbledop,serif;
            font-size: calc(8px * var(--pixel-size));
            line-height: calc(11px * var(--pixel-size));
            padding-bottom: calc(10px * var(--pixel-size));
            color: #ffaf15;
        }

        pre {
            margin: 0;
            padding: calc(2px * var(--pixel-size));
            font-family: bobbledop,serif;
            font-size: calc(8px * var(--pixel-size));
            line-height: calc(11px * var(--pixel-size));
            color: #ffaf15;
        }

        body {
            background-color: #282727;
            padding-bottom: 120px;
        }

        .centered-text {
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: calc(10px * var(--pixel-size));
        }

        .item-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .item {
            width: min(100%, 512px);
            height: auto;
        }

    </style>

</head>
<body>
    <a href="../">
        <pre class="centered-text" style="color:#e0e0e0">&lt; back  </pre>
    </a>
    <pre class="centered-text" style="padding-top: 36px"><span class="spacer">--- </span>portfolio<span class="spacer"> ---</span></pre>

    <p class="centered-text" style="color:#e0e0e0">emojis</p>
    <div class="item-container">
        <img src="../images/portfolio/emojis/standard.png" alt="Standard Emojis" class="item">
        <img src="../images/portfolio/emojis/starfury.png" alt="Starfury Emojis" class="item">
    </div>

    <p class="centered-text" style="color:#e0e0e0">hideaway</p>
    <div class="item-container">
        <img src="../images/portfolio/hideaway/hideaway_sprites.png" alt="Hideaway Sprites" class="item">
        <img src="../images/portfolio/hideaway/hideaway_hotbar.png" alt="Hideaway Hotbar" class="item">
    </div>

</body>
</html>
